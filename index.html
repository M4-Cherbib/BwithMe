<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BwithMe — Private Matchmaker</title>
  <style>
    :root {
      --bg-global: #05021a;
      --bg-mobile: #181135;
      --input-bg: #211947;
      --border-color: #2f2563;
      --text-main: #ffffff;
      --text-muted: #8b83ba;
      --gradient-btn: linear-gradient(90deg, #9b00ff 0%, #ff007b 100%);
      --accent-glow: rgba(255, 0, 123, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { 
      background-color: var(--bg-global); 
      color: var(--text-main); 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 10px;
    }

    .phone-container {
      background-color: var(--bg-mobile);
      border: 4px solid #2d2459;
      border-radius: 40px;
      width: 100%;
      max-width: 410px;
      min-height: 720px;
      padding: 35px 25px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .phone-container::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 25px;
      background: #0d0822;
      border-radius: 20px;
    }

    .brand-header {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 35px;
    }

    .shield-icon {
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, #442582 0%, #aa2582 100%);
      border: 2px solid #df4bb3;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(223, 75, 179, 0.3);
    }

    .shield-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    .brand-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      color: #ffffff;
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .form-group { margin-bottom: 20px; }
    
    label { 
      display: block; 
      font-size: 11px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      margin-bottom: 8px; 
      color: var(--text-muted); 
    }

    input, select { 
      width: 100%; 
      padding: 15px 16px; 
      background-color: var(--input-bg); 
      border: 1px solid var(--border-color); 
      border-radius: 14px; 
      color: #fff; 
      font-size: 15px; 
      transition: all 0.25s;
    }
    
    input:focus, select:focus { 
      border-color: #ff007b; 
      outline: none; 
      box-shadow: 0 0 12px rgba(255, 0, 123, 0.25);
    }
    
    .gradient-btn { 
      width: 100%; 
      padding: 16px; 
      background: var(--gradient-btn); 
      border: none; 
      border-radius: 14px; 
      color: #fff; 
      font-size: 16px; 
      font-weight: 700; 
      cursor: pointer; 
      transition: opacity 0.2s, transform 0.1s; 
      margin-top: 15px;
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    
    .gradient-btn:active { transform: scale(0.98); }
    
    .toggle-footer { 
      text-align: center; 
      font-size: 13px; 
      margin-top: auto; 
      padding-top: 25px;
      color: var(--text-muted); 
    }
    
    .toggle-footer span { 
      color: #ff007b; 
      cursor: pointer; 
      font-weight: 700; 
    }

    .status-msg {
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 18px;
      word-break: break-all;
      display: none;
    }
    .status-error { background: rgba(255, 59, 48, 0.15); border: 1px solid #ff3b30; color: #ff453a; }
    .status-success { background: rgba(52, 199, 89, 0.15); border: 1px solid #34c759; color: #30d158; }
    
    .hidden { display: none !important; }
    .secondary-btn { background: #261f4d; color: #bcaeff; margin-top: 10px; border: 1px solid #3d337a; }
  </style>
</head>
<body>

  <div class="phone-container">
    
    <div class="brand-header">
      <div class="shield-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      </div>
      <div class="brand-title">BwithMe</div>
      <div class="brand-tagline">Private • Safe • Mutual</div>
    </div>

    <div id="status-box" class="status-msg"></div>

    <div id="auth-module">
      <div class="form-group">
        <label>Full Name (Last First)</label>
        <input type="text" id="auth-name" placeholder="e.g. CHERBIB MOHAMED" autocomplete="off">
      </div>

      <div class="form-group hidden" id="pin-setup-group">
        <label>Class Assigned Setup PIN</label>
        <input type="password" id="auth-pin" placeholder="Enter your 4-digit roster PIN">
      </div>

      <div class="form-group" id="pass-group">
        <label id="pass-label">PIN / Account Password</label>
        <input type="password" id="auth-pass" placeholder="Enter password">
      </div>

      <button id="action-btn" class="gradient-btn" onclick="processAuth()">Verify Access →</button>

      <div class="toggle-footer" id="toggle-container">
        First time here? <span onclick="switchView(true)">Create an Account</span>
      </div>
    </div>

    <div id="hub-module" class="hidden">
      <div class="form-group">
        <label>Secure Session Profile</label>
        <input type="text" id="profile-banner" disabled style="opacity: 0.5; font-weight: 700; border-color: transparent;">
      </div>

      <div class="form-group">
        <label for="crush-select">Select Confidential Target</label>
        <select id="crush-select">
          <option value="">-- Choose Classmate --</option>
        </select>
      </div>

      <button class="gradient-btn" onclick="saveSelection()">Lock Choice Securing Match →</button>
      <button class="gradient-btn secondary-btn" onclick="terminateSession()">Log Out / Disconnect</button>
    </div>

  </div>

  <script>
    const BASE_REST_URL = "https://xiitnfszvqymgtrpqym.supabase.co/rest/v1"; 
    const SUPABASE_KEY = "sb_publishable_RcnrnWbVAn8OdGyL3gI3ow_7eEdH494"; 
    
    const CLASS_ROSTER = {
      "AATIK HOUSSAM": "4821", "ACHMIRROU MOSTAFA": "7134", "AGHOUAR KHADIJA": "2956", "AIT BELLA ABDELILAH": "8310",
      "AIT BOURHIM AYOUB": "1549", "AIT HAMMOU MOHAMED AMINE": "6273", "AJAKKA MOHAMED": "3984", "AKABAR OUMAIMA": "5102",
      "ALOUANE WALID": "9437", "ALOUNANE JAMILA": "2061", "ASSABBANE KHADIJA": "7714", "ASSADI HAJAR": "4390",
      "BADR RANIA": "8825", "BAGUENNI WALID": "1256", "BAIKEN MARIAM": "6478", "BANI BALHCEN OUSSAMA": "3192",
      "BARDAGUI NASSIMA": "5503", "BELQADI AYOUBE": "9041", "BEN KAMEL OMAR": "2387", "BENDAHAN ABDERRAHMANE": "7619",
      "BENDAHAR YACINE": "4920", "BENHADOU HIND": "8135", "BENHALIMA IMANE": "3462", "BENJILALI SALMA": "6089",
      "BENKHAYA LAMYAE": "1754", "BISSALITEN HASNAE": "9243", "BOU-IBAOUN KAOUTAR": "5831", "BOUBBAH ABDERRAHIM": "2176",
      "BOUGHALEM YASSAMINE": "6904", "BOUMAHDI ZINEB": "4127", "BOUSDIG AHLAM": "8542", "BOUZID IMRANE": "3019",
      "CHAHID SOUKAINA": "7348", "CHARAFI FATIMA ZAHRA": "1985", "CHENTOUFI ZINEB": "5236", "CHERBIB MOHAMED": "9912",
      "CHKOURRACH ESSAADIA": "4470", "DRIDBA SALMA": "8219", "DRISSI YASSINE": "3654", "EL ALLAOUI KHADIJA": "6108",
      "EL BAIKEM MOHAMED": "2743", "EL FADIL OUASSIME": "7891", "EL HAKIMI AMAL": "1430", "EL KOUSSIMI AYA": "5029",
      "EL MARZOUKI RIDA": "9384", "EL MENBBEHY FATIMA-EZZAHRAE": "6721", "EL MOUBARKI WIAM": "3150", "EL YOUSSFI AYOUB": "8463",
      "ELAMRANI YOUSSRA": "2094", "ELBOUHALI RABIAA": "7532", "ELHARTI CHAIMAE": "4198", "ELHORRI FATIMA ZAHRA": "5802",
      "ES SADRI SOULAIMANE": "1347", "ESSADIKI OUMAIMA": "9621", "ESSOUFI SAIDA": "3840", "ETALBI MOHAMED": "7059",
      "ETTOUNOSY LAILA": "2416", "EZZAHER CHAYMA": "6389", "GHOUFIRI IMANE": "8724", "HABIBI M'BAREK": "1053",
      "HAFID IDRISSI MOUNIA": "4961", "HAJI FATIMA": "3278", "HAMRERRAS SALMA": "8104", "HMIDI IDRISSI SAAD": "5642",
      "ID BELKAS IKRAM": "9215", "IHSSOUS NOUHAILA": "2340", "IZZA ZAKARIA": "7493", "JAMIL YOUSSEF": "6152",
      "JARMOUNE MAROUA": "3891", "KHARBOUCHE SOUHAIB": "8047", "KHATIR HASNAA": "4712", "KHILILA SAMIA": "1593",
      "KISSADE FATIMA ZAHRA": "6824", "LHAROUI CHAIMA": "3409", "MEZIAT RIDA": "9176", "MIFTAHALKHAIR IKRAM": "5241",
      "NOUAR RAJAA": "2830", "OUBLKHIR CHAIMAA": "7942", "OUCHEHRA ABDELHAKIME": "6015", "OUHAMMOU KHADIJA": "4329",
      "OUKALTOUM ABDELLAH": "8691", "OUKHACHA FATIMA ZAHRA": "1734", "QUIRAT SIRINE": "5190", "RABAH NADIA": "3048",
      "RABBAH MARIEM": "9582", "RAZKAOUI HAFSA": "6214", "SANY ADIL": "4083", "SEFNAJ MAROUA": "7329",
      "TOMZINE YOUSSEF": "1640", "WAHKKI HAJAR": "8951", "YAHIA YOUSSEF": "2318", "YASSINE KAOUTAR": "5749",
      "YASSIR IMAD": "9103", "ZAKY SARA": "4632", "ZDIHRI HIBA": "8275"
    };

    let creationFlow = false;
    let applicationUser = null;

    window.onload = function() {
      const activeUser = localStorage.getItem('bwm_authenticated_user');
      if (activeUser) { launchHub(activeUser); }
    };

    function searchRoster(typedName) {
      const sanitized = typedName.trim().toUpperCase().replace(/\s+/g, ' ');
      if (!sanitized) return null;
      if (CLASS_ROSTER[sanitized]) return { exactName: sanitized, pin: CLASS_ROSTER[sanitized] };
      return null;
    }

    function switchView(toSignUp) {
      creationFlow = toSignUp;
      const pinGroup = document.getElementById('pin-setup-group');
      const passLabel = document.getElementById('pass-label');
      const passInput = document.getElementById('auth-pass');
      const btn = document.getElementById('action-btn');
      const toggleBox = document.getElementById('toggle-container');
      
      clearNotifications();

      if (toSignUp) {
        pinGroup.classList.remove('hidden');
        passLabel.innerText = "Create a Secret Password";
        passInput.placeholder = "Password for future logins";
        btn.innerText = "Register Profile →";
        toggleBox.innerHTML = 'Account active? <span onclick="switchView(false)">Log In Instead</span>';
      } else {
        pinGroup.classList.add('hidden');
        passLabel.innerText = "PIN / Account Password";
        passInput.placeholder = "Enter account password";
        btn.innerText = "Verify Access →";
        toggleBox.innerHTML = 'First time here? <span onclick="switchView(true)">Create an Account</span>';
      }
    }

    function dispatchNotice(msg, isSuccess = false) {
      const box = document.getElementById('status-box');
      box.innerText = msg;
      box.className = "status-msg " + (isSuccess ? "status-success" : "status-error");
      box.style.display = 'block';
    }

    function clearNotifications() { document.getElementById('status-box').style.display = 'none'; }

    async function processAuth() {
      clearNotifications();
      const inputName = document.getElementById('auth-name').value.trim();
      let passwordTyped = document.getElementById('auth-pass').value.trim();

      if (!inputName || !passwordTyped) {
        dispatchNotice("Please fill out all identity input fields.");
        return;
      }

      const matchedRosterItem = searchRoster(inputName);

      if (creationFlow) {
        let rosterPin = document.getElementById('auth-pin').value.trim();
        if (!rosterPin) {
          dispatchNotice("You must enter your class assigned setup PIN.");
          return;
        }

        if (!matchedRosterItem || matchedRosterItem.pin !== rosterPin) {
          dispatchNotice("Verification signatures do not match your roster slot.");
          return;
        }

        const standardSystemName = matchedRosterItem.exactName;

        try {
          const response = await fetch(`${BASE_REST_URL}/profiles`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ full_name: standardSystemName, password: passwordTyped })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            if (response.status === 409 || (errData.message && errData.message.includes('duplicate'))) {
              dispatchNotice("Identity record already registered. Switch to login tab.");
            } else {
              dispatchNotice("Database Response: " + (errData.message || response.statusText));
            }
            return;
          }

          dispatchNotice("Secure profile authorized! Syncing hub...", true);
          setTimeout(() => { launchHub(standardSystemName); }, 1500);

        } catch (e) {
          dispatchNotice("Network Transaction Error.");
        }

      } else {
        try {
          const checkDbName = matchedRosterItem ? matchedRosterItem.exactName : inputName.toUpperCase();
          const response = await fetch(`${BASE_REST_URL}/profiles?full_name=eq.${encodeURIComponent(checkDbName)}&password=eq.${encodeURIComponent(passwordTyped)}`, {
            method: 'GET',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Accept': 'application/json'
            }
          });

          if (!response.ok) {
            dispatchNotice("Database Sync Issue.");
            return;
          }

          const data = await response.json();
          if (!data || data.length === 0) {
            dispatchNotice("Access denied. Untrusted name or account password.");
            return;
          }

          launchHub(checkDbName);
        } catch (e) {
          dispatchNotice("Network System Error.");
        }
      }
    }

    function launchHub(userToken) {
      applicationUser = userToken;
      localStorage.setItem('bwm_authenticated_user', userToken);
      
      document.getElementById('auth-module').classList.add('hidden');
      document.getElementById('hub-module').classList.remove('hidden');
      document.getElementById('profile-banner').value = userToken;

      const dropdown = document.getElementById('crush-select');
      dropdown.innerHTML = '<option value="">-- Choose Classmate --</option>';
      
      Object.keys(CLASS_ROSTER).sort().forEach(member => {
        if (member !== userToken) {
          const item = document.createElement('option');
          item.value = member;
          item.innerText = member;
          dropdown.appendChild(item);
        }
      });
    }

    async function saveSelection() {
      const choice = document.getElementById('crush-select').value;
      if (!choice) {
        alert("Select your option before saving system data state.");
        return;
      }

      try {
        await fetch(`${BASE_REST_URL}/selections?user_token=eq.${encodeURIComponent(applicationUser)}`, {
          method: 'DELETE',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const response = await fetch(`${BASE_REST_URL}/selections`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ user_token: applicationUser, picked_token: choice })
        });

        if (!response.ok) {
          alert("Data commit breakdown.");
        } else {
          alert("Confidential choice encrypted and locked!");
        }
      } catch (e) { 
        alert("Transaction system framework interrupt."); 
      }
    }

    function terminateSession() {
      localStorage.removeItem('bwm_authenticated_user');
      applicationUser = null;
      document.getElementById('auth-name').value = '';
      document.getElementById('auth-pin').value = '';
      document.getElementById('auth-pass').value = '';
      switchView(false);
      document.getElementById('hub-module').classList.add('hidden');
      document.getElementById('auth-module').classList.remove('hidden');
    }
  </script>
</body>
</html>
