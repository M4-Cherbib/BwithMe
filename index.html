<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BwithMe — Secure Connected Platform</title>
    <style>
        /* ═══════════════════════════════════════════════
           THEME DEFINITIONS (DARK & LIGHT TOKENS)
        ═══════════════════════════════════════════════ */
        :root[data-theme="dark"] {
            --bg-global: #0b071e;
            --bg-container: #0f0a28;
            --bg-card: #16103c;
            --border-color: #241b56;
            --text-main: #ffffff;
            --text-muted: #8e89b3;
            --color-primary: #d946ef;
            --gradient-accent: linear-gradient(135deg, #a855f7, #ec4899);
            --toggle-bg: rgba(255, 255, 255, 0.05);
        }

        :root[data-theme="light"] {
            --bg-global: #f3f0fc;
            --bg-container: #ffffff;
            --bg-card: #f8f6fe;
            --border-color: #dcd6f7;
            --text-main: #1d183a;
            --text-muted: #6e679a;
            --color-primary: #ca26e2;
            --gradient-accent: linear-gradient(135deg, #9333ea, #db2777);
            --toggle-bg: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-wrapper {
            background-color: var(--bg-container);
            width: 100%;
            max-width: 410px;
            height: 780px;
            border-radius: 42px;
            border: 10px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── THEME SWITCH UI COMPONENT ── */
        .theme-switcher-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--toggle-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            outline: none;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        .title-area {
            text-align: center;
            margin: 40px 0 30px 0;
        }

        .title-area h1 {
            font-size: 32px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
        }

        .action-btn {
            background: var(--gradient-accent);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .alert-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .user-summary {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .members-grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .grid-member-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        .grid-member-card.chosen {
            border-color: var(--color-primary);
            background: linear-gradient(180deg, var(--bg-card), rgba(236, 72, 153, 0.08));
        }

        .avatar-placeholder {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            margin: 0 auto 10px auto;
        }

        .member-card-name {
            font-size: 14px;
            font-weight: 600;
        }

        .check-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background-color: var(--color-primary);
            border-radius: 50%;
            color: #fff;
            font-size: 12px;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .grid-member-card.chosen .check-badge {
            display: flex;
        }

        .selection-list-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .status-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .status-tag.matched {
            background-color: rgba(236, 72, 153, 0.15);
            color: var(--color-primary);
        }

        .status-tag.pending {
            background-color: var(--border-color);
            color: var(--text-muted);
        }

        .bottom-nav-menu {
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 16px 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }

        .nav-link.active {
            color: var(--color-primary);
            font-weight: 700;
        }
    </style>
</head>

        function toggleTheme() {
            const root = document.documentElement;
            const btn = document.getElementById('themeSwitcher');
            const currentTheme = root.getAttribute('data-theme') || 'dark';
            
            if (currentTheme === 'dark') {
                root.setAttribute('data-theme', 'light');
                btn.innerText = "🌙";
            } else {
                root.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️";
            }
        }

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0; 
            }
            return "h" + Math.abs(hash).toString(16);
        }

        let secureProfilesMap = {};
        Object.keys(database.users).forEach(rawKey => {
            let maskedToken = simpleHash(rawKey);
            secureProfilesMap[maskedToken] = {
                displayName: database.users[rawKey].displayName,
                color: database.users[rawKey].color
            };
        });

        window.onload = function() {

        async function supabaseRequest(endpoint, options = {}) {
            const headers = {
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            };
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, { ...options, headers });
            if (!response.ok) {
                throw new Error(await response.text());
            }
            return response.json();
        }

        async function syncDataFromDatabase() {
            try {
                database.allLiveSelections = await supabaseRequest("selections?select=*", { method: "GET" });
            } catch (e) {
                database.allLiveSelections = [];
            }
        }

        async function handleLogin() {
            const inputField = document.getElementById('usernameInput');
            const loginBtn = document.getElementById('loginBtn');
            const userProvidedKey = inputField.value.trim().toLowerCase();
            const errorBanner = document.getElementById('loginError');

            if (database.users[userProvidedKey]) {
                errorBanner.style.display = 'none';
                loginBtn.innerText = "Connecting...";
                loginBtn.disabled = true;

                database.currentUserRawKey = userProvidedKey;
                database.currentUserMaskedToken = simpleHash(userProvidedKey);
                
                await syncDataFromDatabase();

                document.getElementById('currentProfileName').innerText = secureProfilesMap[database.currentUserMaskedToken].displayName;
                document.getElementById('bottomNav').style.display = 'flex';
                
                loginBtn.innerText = "Verify Access →";
                loginBtn.disabled = false;
                
                renderGridUI();
                navigateTo('screenHome');
            } else {
                errorBanner.style.display = 'block';
                inputField.value = '';
            }
        }

        function navigateTo(targetScreenId) {
            document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
            document.getElementById(targetScreenId).classList.add('active');

            document.getElementById('tabHome').classList.remove('active');
            document.getElementById('tabSelections').classList.remove('active');

            if(targetScreenId === 'screenHome') {
                document.getElementById('tabHome').classList.add('active');
                renderGridUI();
            }
            if(targetScreenId === 'screenSelections') {
                document.getElementById('tabSelections').classList.add('active');
                renderSelectionsUI();
            }
        }

        function renderGridUI() {
            const container = document.getElementById('gridContainer');
            container.innerHTML = ''; 

            const activeUserPicks = database.allLiveSelections
                .filter(row => row.user_token === database.currentUserMaskedToken)
                .map(row => row.picked_token);

            Object.keys(secureProfilesMap).sort().forEach(profileToken => {
                if(profileToken === database.currentUserMaskedToken) return;

                const memberData = secureProfilesMap[profileToken];
                const isChosen = activeUserPicks.includes(profileToken);

                const cardElement = document.createElement('div');
                cardElement.className = `grid-member-card ${isChosen ? 'chosen' : ''}`;
                cardElement.onclick = () => handleSelectionToggle(profileToken);

                cardElement.innerHTML = `
                    <div class="avatar-placeholder" style="background-color: ${memberData.color};"></div>
                    <div class="member-card-name">${memberData.displayName}</div>
                    <div class="check-badge">✓</div>
                `;
                container.appendChild(cardElement);
            });
        }

        async function handleSelectionToggle(targetProfileToken) {
            const activeUserPicks = database.allLiveSelections
                .filter(row => row.user_token === database.currentUserMaskedToken)
                .map(row => row.picked_token);

            if (activeUserPicks.includes(targetProfileToken)) {
                try {
                    await supabaseRequest(`selections?user_token=eq.${database.currentUserMaskedToken}&picked_token=eq.${targetProfileToken}`, {
                        method: "DELETE"
                    });
                } catch (e) { alert("Network issue. Failed to clear choice."); return; }
            } else {
                if (activeUserPicks.length >= 2) {
                    alert("Maximum selection threshold reached (2 Choices).");
                    return;
                }
                try {
                    await supabaseRequest("selections", {
                        method: "POST",
                        body: JSON.stringify({
                            user_token: database.currentUserMaskedToken,
                            picked_token: targetProfileToken
                        })
                    });
                } catch (e) { alert("Failed to save selection."); return; }
            }
            
            await syncDataFromDatabase();
            renderGridUI();
        }

                const targetProfile = secureProfilesMap[pickedToken];
                
                const isMutualMatch = database.allLiveSelections.some(row => 
                    row.user_token === pickedToken && row.picked_token === database.currentUserMaskedToken
                );

                const listRow = document.createElement('div');
                listRow.className = 'selection-list-row';
                listRow.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="avatar-placeholder" style="background-color: ${targetProfile.color}; width:40px; height:40px; margin:0;"></div>
                        <div style="font-weight: 600; font-size:15px;">${targetProfile.displayName}</div>
                    </div>
                    <div>
                        ${isMutualMatch 
                            ? `<span class="status-tag matched">💙 Matched</span>` 
                            : `<span class="status-tag pending">Pending</span>`}
                    </div>
                `;
                recordsWrapper.appendChild(listRow);
            });
        }

        function handleLogout() {
            database.currentUserRawKey = null;
            database.currentUserMaskedToken = null;
            database.allLiveSelections = [];
            document.getElementById('usernameInput').value = '';
            document.getElementById('gridContainer').innerHTML = '';
            document.getElementById('selectionsListWrapper').innerHTML = '';
            document.getElementById('bottomNav').style.display = 'none';
            navigateTo('screenLogin');
        }
    </script>
</body>
</html>
